# Macro placement for v3 XOR Neural Network (200x200 die)
# 23 macros: 2 RRAM arrays + 7 WL + 5 ReLU + 2 SA + 7 BL_WD
#
# Macro sizes:
#   RRAM 3x5: 22.870 x 20.650
#   RRAM 5x2: 10.870 x 31.650
#   WL Driver: 8.040 x 12.360
#   ReLU: 3.040 x 10.860
#   Sense Amp: 3.630 x 10.960
#   BL Write Driver: 4.920 x 11.860
#
# Macros start near core left edge (x~6) to prevent isolated filler segments
# Core area: ~5.52 to ~194 in x, ~11.6 to ~188 in y
#
# v2→v3: 5x Layer 1 SAs replaced by 5x ReLU (same positions, ReLU slightly smaller)
#
# instance_name  x  y  orientation

# =========================================================
# Array 1 (Layer 1: 3x5) — left side
# =========================================================

# WL Drivers for Array 1 (5 drivers, 2 columns x 3/2 rows)
# Column gap must be >= 2.0um for nwell.8 (HV-LV nwell spacing)
# Col 1 right edge: 6+8.04=14.04, Col 2 left: 18 → gap=3.96um ✓
u_wl_drv_1_0 6 70 N
u_wl_drv_1_1 6 85 N
u_wl_drv_1_2 6 100 N
u_wl_drv_1_3 18 70 N
u_wl_drv_1_4 18 85 N

# ReLU Activation (5 instances, replacing Layer 1 SAs)
# Placed between WL drivers and RRAM to bridge halo gap
# WL col 2 right: 26.04, ReLU col 1 left: 29 → gap=2.96um (nwell.8 safe) ✓
# ReLU col 1 right: 32.04, ReLU col 2 left: 34 → gap=1.96um ✓
# ReLU col 2 right: 37.04, RRAM left: 40 → gap=2.96um ✓
u_relu_0 29 70 N
u_relu_1 29 83 N
u_relu_2 29 96 N
u_relu_3 34 70 N
u_relu_4 34 83 N

# RRAM 3x5 Array 1 (22.87 wide)
u_rram_array_1 40 78 N

# =========================================================
# Array 2 (Layer 2: 5x2, AND -> XOR) — right side
# =========================================================

# WL Drivers for Array 2 (2 drivers, vertical stack)
u_wl_drv_2_0 72 75 N
u_wl_drv_2_1 72 90 N

# RRAM 5x2 Array 2 (10.87 wide x 31.65 tall)
u_rram_array_2 84 68 N

# Sense Amplifiers for Array 2 (2 SAs, vertical stack)
u_sa_2_0 100 75 N
u_sa_2_1 100 88 N

# =========================================================
# BL Write Drivers (bottom row, both arrays)
# =========================================================

# BL Write Drivers for Array 1 (5 drivers)
u_bl_wd_1_0 6 20 N
u_bl_wd_1_1 14 20 N
u_bl_wd_1_2 22 20 N
u_bl_wd_1_3 30 20 N
u_bl_wd_1_4 38 20 N

# BL Write Drivers for Array 2 (2 drivers)
u_bl_wd_2_0 50 20 N
u_bl_wd_2_1 58 20 N
