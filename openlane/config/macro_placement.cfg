# Macro placement for 2-Array XOR inference (200x200 die)
# Macros start near core left edge (x≈6) to eliminate isolated
# left-edge filler segments that cause DRC nwell.4 and LVS VPB issues.
#
# Macro sizes: RRAM 17.87x25.15, WL 8.04x12.36, SA 3.63x10.96, BL_WD 4.92x11.86
# Core area: ~5.52 to ~194 in x, ~11.6 to ~188 in y
#
# instance_name  x  y  orientation

# =========================================================
# Array 1 (Layer 1: OR + NAND) — left side
# =========================================================

# WL Drivers for Array 1 (2x2 grid, leftmost at x=6)
u_wl_drv_1_0 6 75 N
u_wl_drv_1_1 6 90 N
u_wl_drv_1_2 18 75 N
u_wl_drv_1_3 18 90 N

# RRAM 4x4 Array 1
u_rram_array_1 30 80 N

# Sense Amplifiers for Array 1 (right of RRAM 1)
u_sa1 52 80 N
u_sa2 58 80 N

# =========================================================
# Array 2 (Layer 2: AND) — right side
# =========================================================

# WL Drivers for Array 2 (2x2 grid)
u_wl_drv_2_0 66 75 N
u_wl_drv_2_1 66 90 N
u_wl_drv_2_2 78 75 N
u_wl_drv_2_3 78 90 N

# RRAM 4x4 Array 2
u_rram_array_2 90 80 N

# SA3 (right of RRAM 2)
u_sa3 112 80 N

# =========================================================
# BL Write Drivers (bottom row, both arrays)
# =========================================================

# BL Write Drivers for Array 1
u_bl_wd_1_0 6 20 N
u_bl_wd_1_1 16 20 N
u_bl_wd_1_2 26 20 N
u_bl_wd_1_3 36 20 N

# BL Write Drivers for Array 2
u_bl_wd_2_0 50 20 N
u_bl_wd_2_1 60 20 N
u_bl_wd_2_2 70 20 N
u_bl_wd_2_3 80 20 N
